<html lang="fr">
<head>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090f;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }
    .header {
      background: #111118;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 1rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
    }
    .logo span { color: #e8c87a; }
    .student-area {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #09090f;
      padding: 0.4rem 1rem;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .student-area label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: #5ecfb1;
    }
    select {
      background: #1e1e2a;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 0.4rem 1rem;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1.5rem;
    }
    .progress-bar {
      background: #1e1e2a;
      border-radius: 60px;
      height: 8px;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .progress-fill {
      background: #5ecfb1;
      width: 0%;
      height: 8px;
      border-radius: 60px;
      transition: width 0.2s;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: rgba(240,237,232,0.5);
      margin-bottom: 1.5rem;
    }
    .card {
      background: #111118;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .competence-badge {
      display: inline-block;
      background: rgba(94,207,177,0.15);
      border: 1px solid rgba(94,207,177,0.3);
      border-radius: 60px;
      padding: 0.2rem 0.8rem;
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      color: #5ecfb1;
      margin-bottom: 1rem;
    }
    .question {
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }
    .choices {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }
    .choice {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: #1a1a24;
      padding: 0.7rem 1rem;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.1s;
    }
    .choice:hover {
      background: #262632;
    }
    input[type="radio"] {
      accent-color: #5ecfb1;
      width: 18px;
      height: 18px;
    }
    .choice-label {
      font-size: 1rem;
    }
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: space-between;
      align-items: center;
    }
    button {
      background: rgba(94,207,177,0.1);
      border: 1px solid rgba(94,207,177,0.4);
      color: #5ecfb1;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover {
      background: rgba(94,207,177,0.25);
    }
    .feedback {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 16px;
      font-size: 0.9rem;
      display: none;
    }
    .feedback.correct {
      background: rgba(126,207,138,0.15);
      border: 1px solid #7ecf8a;
      color: #7ecf8a;
      display: block;
    }
    .feedback.incorrect {
      background: rgba(245,90,90,0.15);
      border: 1px solid #f55a5a;
      color: #f55a5a;
      display: block;
    }
    .btn-secondary {
      background: transparent;
      border-color: rgba(255,255,255,0.2);
      color: rgba(240,237,232,0.7);
    }
    .footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.7rem;
      color: rgba(240,237,232,0.3);
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 2rem;
    }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .card { padding: 1.2rem; }
      .question { font-size: 1.1rem; }
    }
  </style>
</head>

    if (savedIndex !== null && !isNaN(parseInt(savedIndex))) {
      currentIndex = parseInt(savedIndex);
      if (currentIndex >= exercises.length) currentIndex = exercises.length - 1;
      if (currentIndex < 0) currentIndex = 0;
    } else {
      currentIndex = 0;
    }
    const savedAnswers = localStorage.getItem('fr_sessionAnswers');
    if (savedAnswers) {
      try { sessionAnswers = JSON.parse(savedAnswers); } catch(e) { sessionAnswers = []; }
    } else {
      sessionAnswers = [];
    }
    updateProgressDisplay();
  }

  function saveProgress() {
    localStorage.setItem('fr_currentIndex', currentIndex);
    localStorage.setItem('fr_sessionAnswers', JSON.stringify(sessionAnswers));
  }

  function updateProgressDisplay() {
    const total = exercises.length;
    const answered = sessionAnswers.length;
    const percent = (answered / total) * 100;
    progressFill.style.width = percent + "%";
    sessionCounterSpan.innerText = `Exercice ${answered} / ${total}`;
  }

  // --------------------------------------------------------------
  // Afficher l'exercice courant
  function displayExercise() {
    const ex = exercises[currentIndex];
    if (!ex) return;
    compBadge.innerText = ex.competence;
    questionText.innerText = ex.text;
    // Générer les choix (boutons radio)
    let html = '';
    ex.choices.forEach((choice, idx) => {
      const letter = String.fromCharCode(65+idx); // A,B,C,D
      html += `
        <label class="choice">
          <input type="radio" name="choice" value="${escapeHtml(choice)}">
          <span class="choice-label">${letter}. ${escapeHtml(choice)}</span>
        </label>
      `;
    });
    choicesContainer.innerHTML = html;
    feedbackDiv.className = 'feedback';
    feedbackDiv.style.display = 'none';
    // Décocher tous les radios
    const radios = document.querySelectorAll('input[name="choice"]');
    radios.forEach(r => r.checked = false);
  }

  // simple échappement
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // --------------------------------------------------------------
  // Envoyer la réponse au Google Sheet
  async function sendToSheet(prenom, matiere, competence, exerciceId, reponse, correct, tempsMs = 0) {
    if (!prenom) return;
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          prenom: prenom,
          matiere: matiere,
          competence: competence,
          exerciceId: exerciceId,
          reponse: reponse,
          correct: correct ? "true" : "false",
          scoreMax: "1",
          tempsMs: tempsMs.toString()
        })
      });
    } catch(e) { console.warn("Erreur envoi sheet", e); }
  }

  // Vérifier la réponse
  async function checkAnswer() {
    const selectedRadio = document.querySelector('input[name="choice"]:checked');
    if (!selectedRadio) {
      feedbackDiv.innerText = "⚠️ Choisis une réponse avant de valider.";
      feedbackDiv.className = 'feedback incorrect';
      feedbackDiv.style.display = 'block';
      return;
    }
    const userAnswer = selectedRadio.value;
    const ex = exercises[currentIndex];
    const isCorrect = (userAnswer === ex.correct);
    // Enregistrer localement
    sessionAnswers.push({ id: ex.id, correct: isCorrect, answer: userAnswer });
    saveProgress();
    updateProgressDisplay();

    // Afficher feedback
    feedbackDiv.innerText = isCorrect ? "✔️ Bonne réponse !" : `❌ Mauvaise réponse. La bonne réponse était : ${ex.correct}`;
    feedbackDiv.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
    feedbackDiv.style.display = 'block';

    // Envoyer au Sheet
    await sendToSheet(prenom, "francais", ex.competence, ex.id, userAnswer, isCorrect, 0);

    // Passer à l'exercice suivant après 1s
    setTimeout(() => {
      if (currentIndex + 1 < exercises.length) {
        currentIndex++;
        displayExercise();
        // défilement fluide
        document.getElementById('exerciseCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        // Fin du parcours
        feedbackDiv.innerText = "🎉 Félicitations ! Tu as terminé tous les exercices de français. Retourne à l'accueil ou continue en maths.";
        feedbackDiv.className = 'feedback correct';
        feedbackDiv.style.display = 'block';
        validateBtn.disabled = true;
        skipBtn.disabled = true;
      }
      saveProgress();
    }, 1000);
  }

  // Passer (sans enregistrer la réponse, mais on passe à l'exercice suivant)
  function skipExercise() {
    if (currentIndex + 1 < exercises.length) {
      currentIndex++;
      displayExercise();
      feedbackDiv.style.display = 'none';
      saveProgress();
    } else {
      feedbackDiv.innerText = "Tu as déjà terminé tous les exercices !";
      feedbackDiv.className = 'feedback correct';
      feedbackDiv.style.display = 'block';
    }
  }

  // --------------------------------------------------------------
  // Gestion prénom
  function initPrenom() {
    const saved = localStorage.getItem('elevePrenom');
    if (saved && prenomSelect.querySelector(`option[value="${saved}"]`)) {
      prenomSelect.value = saved;
      prenom = saved;
    } else {
      prenom = "";
    }
    prenomSelect.addEventListener('change', () => {
      prenom = prenomSelect.value;
      if (prenom) localStorage.setItem('elevePrenom', prenom);
      else localStorage.removeItem('elevePrenom');
    });
  }

  // --------------------------------------------------------------
  // Démarrage
  function init() {
    initPrenom();
    loadProgress();
    displayExercise();
    validateBtn.addEventListener('click', checkAnswer);
    skipBtn.addEventListener('click', skipExercise);
  }

  init();
</script>
</body>
</html>
