<head>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090f;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }
    .header {
      background: #111118;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 1rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
    }
    .logo span { color: #e8c87a; }
    .student-area {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #09090f;
      padding: 0.4rem 1rem;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .student-area label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: #5ecfb1;
    }
    select {
      background: #1e1e2a;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 0.4rem 1rem;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1.5rem;
    }
    .progress-bar {
      background: #1e1e2a;
      border-radius: 60px;
      height: 8px;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .progress-fill {
      background: #5ecfb1;
      width: 0%;
      height: 8px;
      border-radius: 60px;
      transition: width 0.2s;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: rgba(240,237,232,0.5);
      margin-bottom: 1.5rem;
    }
    .card {
      background: #111118;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .competence-badge {
      display: inline-block;
      background: rgba(94,207,177,0.15);
      border: 1px solid rgba(94,207,177,0.3);
      border-radius: 60px;
      padding: 0.2rem 0.8rem;
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      color: #5ecfb1;
      margin-bottom: 1rem;
    }
    .question {
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }
    .choices {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }
    .choice {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: #1a1a24;
      padding: 0.7rem 1rem;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.1s;
    }
    .choice:hover {
      background: #262632;
    }
    input[type="radio"] {
      accent-color: #5ecfb1;
      width: 18px;
      height: 18px;
    }
    .choice-label {
      font-size: 1rem;
    }
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: space-between;
      align-items: center;
    }
    button {
      background: rgba(94,207,177,0.1);
      border: 1px solid rgba(94,207,177,0.4);
      color: #5ecfb1;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover {
      background: rgba(94,207,177,0.25);
    }
    .feedback {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 16px;
      font-size: 0.9rem;
      display: none;
    }
    .feedback.correct {
      background: rgba(126,207,138,0.15);
      border: 1px solid #7ecf8a;
      color: #7ecf8a;
      display: block;
    }
    .feedback.incorrect {
      background: rgba(245,90,90,0.15);
      border: 1px solid #f55a5a;
      color: #f55a5a;
      display: block;
    }
    .btn-secondary {
      background: transparent;
      border-color: rgba(255,255,255,0.2);
      color: rgba(240,237,232,0.7);
    }
    .footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.7rem;
      color: rgba(240,237,232,0.3);
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 2rem;
    }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .card { padding: 1.2rem; }
      .question { font-size: 1.1rem; }
    }
  </style>
</head>

<script>

    { id: "CONJ_IMP_3", competence: "Imparfait", text: "Conjuguez « prendre » à l’imparfait pour « ils ».", choices: ["ils prennent", "ils prenaient", "ils prendront", "ils prirent"], correct: "ils prenaient" },
    { id: "CONJ_IMP_4", competence: "Imparfait", text: "Conjuguez « être » à l’imparfait pour « tu ».", choices: ["tu es", "tu seras", "tu étais", "tu fus"], correct: "tu étais" },
    { id: "CONJ_IMP_5", competence: "Imparfait", text: "Conjuguez « avoir » à l’imparfait pour « elles ».", choices: ["elles ont", "elles auront", "elles avaient", "elles eurent"], correct: "elles avaient" }
  ];
  const conjPasseCompose = [
    { id: "CONJ_PC_1", competence: "Passé composé", text: "Conjuguez « manger » au passé composé pour « j’ ».", choices: ["j’ai mangé", "je mange", "je mangerai", "je mangeais"], correct: "j’ai mangé" },
    { id: "CONJ_PC_2", competence: "Passé composé", text: "Conjuguez « partir » au passé composé pour « ils ».", choices: ["ils partent", "ils sont partis", "ils avaient parti", "ils partiront"], correct: "ils sont partis" },
    { id: "CONJ_PC_3", competence: "Passé composé", text: "Conjuguez « voir » au passé composé pour « nous ».", choices: ["nous voyons", "nous avons vu", "nous verrons", "nous voyions"], correct: "nous avons vu" },
    { id: "CONJ_PC_4", competence: "Passé composé", text: "Conjuguez « prendre » au passé composé pour « elle ».", choices: ["elle prend", "elle a pris", "elle prenait", "elle prendra"], correct: "elle a pris" },

  // Grammaire – nature (5)
  const gramNature = [
    { id: "GRAM_NAT_1", competence: "Nature adverbe", text: "Quelle est la nature du mot « rapidement » ?", choices: ["adjectif", "nom", "verbe", "adverbe"], correct: "adverbe" },

  const gramFonctions = [
    { id: "GRAM_FONC_1", competence: "COD", text: "Dans « Marie mange une pomme », fonction de « une pomme » ?", choices: ["sujet", "COD", "COI", "complément circonstanciel"], correct: "COD" },

  ];

  // Lexique – 13 compétences avec 3 variantes chacune (items les plus discriminants)
  const lexique = [
    // F1 (peine)
    { id: "F1_1", competence: "F1 – Sens de peine", text: "Il a eu peine à terminer son dessin. Que signifie « peine » ?", choices: ["difficulté", "chagrin", "justesse", "joie"], correct: "difficulté" },
    { id: "F1_2", competence: "F1 – Sens de peine", text: "La nouvelle lui a fait de la peine. Que signifie « peine » ?", choices: ["difficulté", "joie", "chagrin", "justesse"], correct: "chagrin" },
    { id: "F1_3", competence: "F1 – Sens de peine", text: "J’ai à peine eu le temps de dire bonjour. Que signifie « à peine » ?", choices: ["chagrin", "difficulté", "joie", "justesse"], correct: "justesse" },
    // F2 (émotions)
    { id: "F2_1", competence: "F2 – Émotion", text: "Lequel n’est pas une émotion ?", choices: ["panique", "chaise", "joie", "tristesse"], correct: "chaise" },
    { id: "F2_2", competence: "F2 – Émotion", text: "Lequel n’est pas une émotion ?", choices: ["table", "colère", "peur", "surprise"], correct: "table" },
    { id: "F2_3", competence: "F2 – Émotion", text: "Lequel n’est pas une émotion ?", choices: ["crayon", "dégoût", "admiration", "fierté"], correct: "crayon" },
    // F3 (famille main)
    { id: "F3_1", competence: "F3 – Famille main", text: "Trouve le mot de la même famille que « manuel », « manucure », « manuscrit ».", choices: ["main", "manoir", "manteau", "manger"], correct: "main" },
    { id: "F3_2", competence: "F3 – Famille main", text: "Même consigne.", choices: ["manoir", "main", "malice", "mandat"], correct: "main" },

    { id: "F4_3", competence: "F4 – Remplacer « parle de »", text: "Remplace « parle de » dans : « Cet article parle de la guerre. »", choices: ["traite de", "fuit", "détruit", "salit"], correct: "traite de" },

    { id: "F14_1", competence: "F14 – Champ lexical", text: "tremblement, angoisse, frayeur → thème :", choices: ["la joie", "la colère", "la tristesse", "la peur"], correct: "la peur" },
    { id: "F14_2", competence: "F14 – Champ lexical", text: "rire, plaisir, bonheur → thème :", choices: ["la joie", "la peur", "le bruit", "le silence"], correct: "la joie" },
    { id: "F14_3", competence: "F14 – Champ lexical", text: "tonnerre, explosion, murmure → thème :", choices: ["la lumière", "l’eau", "l’air", "le bruit"], correct: "le bruit" },
    // F15 (synonyme succulent)
    { id: "F15_1", competence: "F15 – Synonyme", text: "Un plat succulent est :", choices: ["fade", "amer", "brûlant", "délicieux"], correct: "délicieux" },
    { id: "F15_2", competence: "F15 – Synonyme", text: "Lequel est synonyme de succulent ?", choices: ["infect", "insipide", "froid", "exquis"], correct: "exquis" },
    { id: "F15_3", competence: "F15 – Synonyme", text: "Lequel est synonyme ?", choices: ["dégoûtant", "immangeable", "rassis", "savoureux"], correct: "savoureux" }
  ];

  // Assemblage final
  const exercises = [
    ...conjPresent, ...conjImparfait, ...conjPasseCompose, ...conjFutur,
    ...gramNature, ...gramFonctions,
    ...orthographe,
    ...lexique
  ]; // total = 20+10+5+39 = 74

  // --------------------------------------------------------------
  // État
  let currentIndex = 0;
  let sessionAnswers = [];
  let prenom = "";

  const prenomSelect = document.getElementById('prenomSelect');
  const compBadge = document.getElementById('compBadge');
  const questionText = document.getElementById('questionText');
  const choicesContainer = document.getElementById('choicesContainer');
  const validateBtn = document.getElementById('validateBtn');
  const skipBtn = document.getElementById('skipBtn');
  const feedbackDiv = document.getElementById('feedback');
  const progressFill = document.getElementById('progressFill');
  const sessionCounterSpan = document.getElementById('sessionCounter');

  function updateProgressDisplay() {
    const total = exercises.length;
    const answered = sessionAnswers.length;
    const percent = (answered / total) * 100;
    progressFill.style.width = percent + "%";
    sessionCounterSpan.innerText = `Exercice ${answered} / ${total}`;
  }

  function displayExercise() {
    const ex = exercises[currentIndex];
    if (!ex) return;
    compBadge.innerText = ex.competence;
    questionText.innerText = ex.text;
    let html = '';
    ex.choices.forEach((choice, idx) => {
      const letter = String.fromCharCode(65+idx);
      html += `
        <label class="choice">
          <input type="radio" name="choice" value="${escapeHtml(choice)}">
          <span class="choice-label">${letter}. ${escapeHtml(choice)}</span>
        </label>
      `;
    });
    choicesContainer.innerHTML = html;
    feedbackDiv.className = 'feedback';
    feedbackDiv.style.display = 'none';
    const radios = document.querySelectorAll('input[name="choice"]');
    radios.forEach(r => r.checked = false);
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function sendToSheet(prenom, matiere, competence, exerciceId, reponse, correct, tempsMs = 0) {
    if (!prenom) return;
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          prenom: prenom,
          matiere: matiere,
          competence: competence,
          exerciceId: exerciceId,
          reponse: reponse,
          correct: correct ? "true" : "false",
          scoreMax: "1",
          tempsMs: tempsMs.toString()
        })
      });
    } catch(e) { console.warn("Erreur envoi sheet", e); }
  }

  function loadProgress() {
    const savedIndex = localStorage.getItem('fr_currentIndex');
    if (savedIndex !== null && !isNaN(parseInt(savedIndex))) {
      currentIndex = parseInt(savedIndex);
      if (currentIndex >= exercises.length) currentIndex = exercises.length - 1;
      if (currentIndex < 0) currentIndex = 0;
    } else currentIndex = 0;
    const savedAnswers = localStorage.getItem('fr_sessionAnswers');
    if (savedAnswers) {
      try { sessionAnswers = JSON.parse(savedAnswers); } catch(e) { sessionAnswers = []; }
    } else sessionAnswers = [];
    updateProgressDisplay();
  }

  function saveProgress() {
    localStorage.setItem('fr_currentIndex', currentIndex);
    localStorage.setItem('fr_sessionAnswers', JSON.stringify(sessionAnswers));
  }

  async function checkAnswer() {
    const selectedRadio = document.querySelector('input[name="choice"]:checked');
    if (!selectedRadio) {
      feedbackDiv.innerText = "⚠️ Choisis une réponse avant de valider.";
      feedbackDiv.className = 'feedback incorrect';
      feedbackDiv.style.display = 'block';
      return;
    }
    const userAnswer = selectedRadio.value;
    const ex = exercises[currentIndex];
    const isCorrect = (userAnswer === ex.correct);
    sessionAnswers.push({ id: ex.id, correct: isCorrect, answer: userAnswer });
    saveProgress();
    updateProgressDisplay();

    feedbackDiv.innerText = isCorrect ? "✔️ Bonne réponse !" : `❌ Mauvaise réponse. La bonne réponse était : ${ex.correct}`;
    feedbackDiv.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
    feedbackDiv.style.display = 'block';

    await sendToSheet(prenom, "francais", ex.competence, ex.id, userAnswer, isCorrect, 0);

    setTimeout(() => {
      if (currentIndex + 1 < exercises.length) {
        currentIndex++;
        displayExercise();
        document.getElementById('exerciseCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        feedbackDiv.innerText = "🎉 Félicitations ! Tu as terminé tous les exercices de français. Retourne à l'accueil.";
        feedbackDiv.className = 'feedback correct';
        feedbackDiv.style.display = 'block';
        validateBtn.disabled = true;
        skipBtn.disabled = true;
      }
      saveProgress();
    }, 1000);
  }

  function skipExercise() {
    if (currentIndex + 1 < exercises.length) {
      currentIndex++;
      displayExercise();
      feedbackDiv.style.display = 'none';
      saveProgress();
    } else {
      feedbackDiv.innerText = "Tu as déjà terminé tous les exercices !";
      feedbackDiv.className = 'feedback correct';
      feedbackDiv.style.display = 'block';
    }
  }

  // Gestion prénom avec réinitialisation pour Testeur
  function initPrenom() {
    const saved = localStorage.getItem('elevePrenom');
    if (saved && prenomSelect.querySelector(`option[value="${saved}"]`)) {
      prenomSelect.value = saved;
      prenom = saved;
    } else {
      prenom = "";
    }

    if (prenom === "Testeur") {
      localStorage.removeItem('fr_currentIndex');
      localStorage.removeItem('fr_sessionAnswers');
      currentIndex = 0;
      sessionAnswers = [];
      updateProgressDisplay();
      displayExercise();
    }

    prenomSelect.addEventListener('change', () => {
      const newPrenom = prenomSelect.value;
      if (newPrenom === "Testeur") {
        localStorage.removeItem('fr_currentIndex');
        localStorage.removeItem('fr_sessionAnswers');
        currentIndex = 0;
        sessionAnswers = [];
        updateProgressDisplay();
        displayExercise();
      }
      prenom = newPrenom;
      if (prenom) localStorage.setItem('elevePrenom', prenom);
      else localStorage.removeItem('elevePrenom');
    });
  }

  function init() {
    initPrenom();
    loadProgress();
    displayExercise();
    validateBtn.addEventListener('click', checkAnswer);
    skipBtn.addEventListener('click', skipExercise);
  }

  init();
</script>
</body>
</html>
