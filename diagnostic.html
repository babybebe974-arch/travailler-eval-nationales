<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Diagnostic — Travailler évaluations nationales</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090f;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }
    .header {
      background: #111118;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 1rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
    }
    .logo span { color: #e8c87a; }
    .student-area {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #09090f;
      padding: 0.4rem 1rem;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .student-area label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: #5ecfb1;
    }
    select {
      background: #1e1e2a;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 0.4rem 1rem;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1.5rem;
    }
    .progress-bar {
      background: #1e1e2a;
      border-radius: 60px;
      height: 8px;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .progress-fill {
      background: #f5a65a;
      width: 0%;
      height: 8px;
      border-radius: 60px;
      transition: width 0.2s;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: rgba(240,237,232,0.5);
      margin-bottom: 1.5rem;
    }
    .card {
      background: #111118;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .competence-badge {
      display: inline-block;
      background: rgba(245,166,90,0.15);
      border: 1px solid rgba(245,166,90,0.3);
      border-radius: 60px;
      padding: 0.2rem 0.8rem;
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      color: #f5a65a;
      margin-bottom: 1rem;
    }
    .question {
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }
    .choices {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }
    .choice {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: #1a1a24;
      padding: 0.7rem 1rem;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.1s;
    }
    .choice:hover {
      background: #262632;
    }
    input[type="radio"] {
      accent-color: #f5a65a;
      width: 18px;
      height: 18px;
    }
    .choice-label {
      font-size: 1rem;
    }
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: space-between;
      align-items: center;
    }
    button {
      background: rgba(245,166,90,0.1);
      border: 1px solid rgba(245,166,90,0.4);
      color: #f5a65a;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover {
      background: rgba(245,166,90,0.25);
    }
    .feedback {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 16px;
      font-size: 0.9rem;
      display: none;
    }
    .feedback.correct {
      background: rgba(126,207,138,0.15);
      border: 1px solid #7ecf8a;
      color: #7ecf8a;
      display: block;
    }
    .feedback.incorrect {
      background: rgba(245,90,90,0.15);
      border: 1px solid #f55a5a;
      color: #f55a5a;
      display: block;
    }
    .btn-secondary {
      background: transparent;
      border-color: rgba(255,255,255,0.2);
      color: rgba(240,237,232,0.7);
    }
    .footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.7rem;
      color: rgba(240,237,232,0.3);
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 2rem;
    }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .card { padding: 1.2rem; }
      .question { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">Travailler <span>évaluations nationales</span></div>
  <div class="student-area">
    <label>👤 Élève</label>
    <select id="prenomSelect">
      <option value="">-- Sélectionne --</option>
      <option value="Raphael">Raphael</option><option value="Heidi">Heidi</option><option value="Alice">Alice</option>
      <option value="Norah">Norah</option><option value="Adèle">Adèle</option><option value="Kim">Kim</option>
      <option value="Sheurley">Sheurley</option><option value="Iris">Iris</option><option value="Luc">Luc</option>
      <option value="Trecy">Trecy</option><option value="Loris">Loris</option><option value="Léna">Léna</option>
      <option value="Amandine">Amandine</option><option value="Ethan">Ethan</option><option value="Andryana">Andryana</option>
      <option value="Kaysia">Kaysia</option><option value="Camila">Camila</option><option value="Cassie">Cassie</option>
      <option value="Adriel">Adriel</option><option value="Testeur">Testeur</option>
    </select>
  </div>
</div>

<div class="container">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="stats">
    <span>📋 Diagnostic initial (30 questions)</span>
    <span id="sessionCounter">Question 0 / 30</span>
  </div>

  <div class="card" id="diagnosticCard">
    <div><span class="competence-badge" id="compBadge">Français</span></div>
    <div class="question" id="questionText"></div>
    <div class="choices" id="choicesContainer"></div>
    <div class="actions">
      <button id="validateBtn" class="btn-primary">✓ Vérifier</button>
      <button id="skipBtn" class="btn-secondary">⏩ Passer (sans enregistrer)</button>
    </div>
    <div id="feedback" class="feedback"></div>
  </div>
</div>
<div class="footer">
  <p>Diagnostic initial — Les résultats sont envoyés au tableau de bord enseignant.</p>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXtYaj1izgW7vHXlINk7vl1eVj_vTnV9Gq4TRShSJDlwKbnHwScwUzOW5PwDn_mLfk/exec";

  // --------------------------------------------------------------
  // BANQUE D'EXERCICES FRANÇAIS (15 items, basés sur les compétences les plus faibles en REP+)
  const frenchExercises = [
    // Lexique – Q11 (peine)
    { id: "F_Q11", competence: "Lexique", matiere: "francais", text: "Dans « Il éprouve de la peine à parler », que signifie « peine » ?", choices: ["difficulté", "chagrin", "justesse", "joie"], correct: "difficulté" },
    // Lexique – Q14 (émotion)
    { id: "F_Q14", competence: "Lexique", matiere: "francais", text: "Quel mot n’est pas lié à une émotion ?", choices: ["inquiétude", "angoissse", "rumeur", "frissonnante"], correct: "rumeur" },
    // Lexique – Q4 (famille main)
    { id: "F_Q4", competence: "Lexique", matiere: "francais", text: "Lequel est de la même famille que « manuel », « manucure », « manuscrit » ?", choices: ["manoir", "maître", "main", "maigre"], correct: "main" },
    // Lexique – Q15 (remplacer parle de)
    { id: "F_Q15", competence: "Lexique", matiere: "francais", text: "Remplace « parle de » dans : « Le texte parle de l’enfance de l’auteur. »", choices: ["se souvient de", "s’agit de", "évoque", "exploite"], correct: "évoque" },
    // Lexique – Q10 (même mot)
    { id: "F_Q10", competence: "Lexique", matiere: "francais", text: "Complète les deux phrases par le même mot : « Marie n’a pas … nécessaire de nous prévenir. » / « Le délinquant va être … en comparution immédiate. »", choices: ["jugé", "convoqué", "estimé", "pensé"], correct: "jugé" },
    // Lexique – Q3 (suffixe -eur)
    { id: "F_Q3", competence: "Lexique", matiere: "francais", text: "Lequel est formé comme « vendeur » (verbe + -eur) ?", choices: ["malheur", "chaleur", "joueur", "longueur"], correct: "joueur" },
    // Lexique – Q1 (préfixe mal-)
    { id: "F_Q1", competence: "Lexique", matiere: "francais", text: "Trouve l’intrus (pas le sens négatif de mal-) :", choices: ["malade", "malhabile", "malheureux", "malchanceux"], correct: "malade" },
    // Orthographe – accord sujet-verbe (sujet éloigné)
    { id: "F_ORTH1", competence: "Orthographe", matiere: "francais", text: "Complète : « Les odeurs qui viennent de la cuisine … délicieuses. » (être)", choices: ["est", "sont", "était", "sera"], correct: "sont" },
    // Orthographe – accord GN (pluriel)
    { id: "F_ORTH2", competence: "Orthographe", matiere: "francais", text: "Complète : « Des tables … et propres. » (blanc)", choices: ["blanc", "blanche", "blanches", "blancs"], correct: "blanches" },
    // Grammaire – nature des mots (adverbe)
    { id: "F_GRAM1", competence: "Grammaire", matiere: "francais", text: "Quelle est la nature du mot « rapidement » ?", choices: ["adjectif", "nom", "verbe", "adverbe"], correct: "adverbe" },
    // Grammaire – fonction COD
    { id: "F_GRAM2", competence: "Grammaire", matiere: "francais", text: "Dans « Paul mange une pomme », quelle est la fonction de « une pomme » ?", choices: ["sujet", "COD", "COI", "complément circonstanciel"], correct: "COD" },
    // Grammaire – fonction COI
    { id: "F_GRAM3", competence: "Grammaire", matiere: "francais", text: "Dans « Il parle à son ami », fonction de « à son ami » ?", choices: ["COD", "COI", "sujet", "attribut"], correct: "COI" },
    // Conjugaison – imparfait (3e groupe)
    { id: "F_CONJ1", competence: "Conjugaison", matiere: "francais", text: "Conjuguez « aller » à l’imparfait pour « nous ».", choices: ["nous allons", "nous allions", "nous irons", "nous allâmes"], correct: "nous allions" },
    // Conjugaison – passé composé (verbe irrégulier)
    { id: "F_CONJ2", competence: "Conjugaison", matiere: "francais", text: "Conjuguez « prendre » au passé composé pour « ils ».", choices: ["ils prennent", "ils ont pris", "ils avaient pris", "ils prendront"], correct: "ils ont pris" },
    // Conjugaison – présent (verbe du 3e groupe)
    { id: "F_CONJ3", competence: "Conjugaison", matiere: "francais", text: "Conjuguez « finir » au présent pour « tu ».", choices: ["tu finis", "tu finit", "tu finissais", "tu finiras"], correct: "tu finis" }
  ];

  // BANQUE EXERCICES MATHÉMATIQUES (15 items variés, dont problèmes complexes)
  const mathExercises = [
    { id: "M_MASSE", competence: "Masse unitaire", matiere: "maths", text: "36 objets identiques pèsent 1,8 kg. Quelle est la masse d’un objet ?", choices: ["0,5 kg", "50 g", "5 g", "0,05 kg"], correct: "50 g" },
    { id: "M_PROP", competence: "Proportionnalité", matiere: "maths", text: "5 paquets de gâteaux coûtent 7,50 €. Combien coûtent 3 paquets ?", choices: ["3 €", "4 €", "4,50 €", "5 €"], correct: "4,50 €" },
    { id: "M_PERIM", competence: "Périmètre", matiere: "maths", text: "Un rectangle a un périmètre de 240 cm et une largeur de 30 cm. Quelle est sa longueur ?", choices: ["60 cm", "90 cm", "120 cm", "180 cm"], correct: "90 cm" },
    { id: "M_QUADRI", competence: "Périmètre quadrillage", matiere: "maths", text: "Un rectangle mesure 6 carreaux sur 4 (1 carreau = 1 cm). Quel est son périmètre ?", choices: ["20 cm", "24 cm", "18 cm", "22 cm"], correct: "20 cm" },
    { id: "M_MULT", competence: "Multiplication décimale", matiere: "maths", text: "Calcule : 6,3 × 4 = ?", choices: ["24,2", "25,2", "25,6", "26,2"], correct: "25,2" },
    { id: "M_MONNAIE", competence: "Monnaie rendue", matiere: "maths", text: "Tu achètes 3 stylos à 1,80 € l’un et tu donnes 10 €. Combien te rend-on ?", choices: ["4,60 €", "4,20 €", "5,40 €", "6,20 €"], correct: "4,60 €" },
    { id: "M_COMBINAISON", competence: "Combinaisons", matiere: "maths", text: "Avec 3 t‑shirts et 5 casquettes, combien de tenues différentes ?", choices: ["8", "15", "12", "20"], correct: "15" },
    { id: "M_DUREE", competence: "Calcul de durée", matiere: "maths", text: "Une activité commence à 9h45 et dure 35 minutes. À quelle heure se termine-t-elle ?", choices: ["10h10", "10h20", "10h30", "10h00"], correct: "10h20" },
    { id: "M_COUT", competence: "Coût total", matiere: "maths", text: "5 personnes, 6 jours, 25 € par jour et par personne. Coût total ?", choices: ["500 €", "750 €", "600 €", "900 €"], correct: "750 €" },
    { id: "M_PARTAGE", competence: "Partage avec reste", matiere: "maths", text: "56 bonbons, on donne 9 à chaque enfant, il reste 2. Combien d’enfants ?", choices: ["5", "6", "7", "8"], correct: "6" },
    { id: "M_OPERATION", competence: "Opération litres", matiere: "maths", text: "9 bouteilles de 0,75 L : quelle opération donne le volume total ?", choices: ["9 + 0,75", "9 × 0,75 + prix", "9 × 0,75", "9 + 0,75 + prix"], correct: "9 × 0,75" },
    { id: "M_ECONOMIE", competence: "Économie d’eau", matiere: "maths", text: "Douche 50 L, bain 180 L. Économie sur 5 jours ?", choices: ["650 L", "700 L", "750 L", "900 L"], correct: "650 L" },
    { id: "M_MOITIE", competence: "Moitié d’un décimal", matiere: "maths", text: "Quelle est la moitié de 12,6 ?", choices: ["6,2", "6,3", "6,4", "6,1"], correct: "6,3" },
    { id: "M_EQUATION", competence: "Équation simple", matiere: "maths", text: "Nombre + 7 = moitié de 200. Quel est ce nombre ?", choices: ["93", "97", "103", "107"], correct: "93" },
    { id: "M_COMPLEXE", competence: "Problème complexe", matiere: "maths", text: "Un lot de 3 cahiers coûte 12 €. J’achète 6 cahiers et je paie avec un billet de 50 €. Combien me rend‑on ?", choices: ["26 €", "24 €", "14 €", "38 €"], correct: "26 €" }
  ];

  // Mélanger et sélectionner 15 français + 15 maths
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const shuffledFrench = shuffleArray([...frenchExercises]);
  const shuffledMath = shuffleArray([...mathExercises]);
  const diagnosticExercises = [
    ...shuffledFrench.slice(0, 15),
    ...shuffledMath.slice(0, 15)
  ];
  const finalExercises = shuffleArray(diagnosticExercises);

  // État
  let currentIndex = 0;
  let sessionAnswers = [];
  let prenom = "";

  const prenomSelect = document.getElementById('prenomSelect');
  const compBadge = document.getElementById('compBadge');
  const questionText = document.getElementById('questionText');
  const choicesContainer = document.getElementById('choicesContainer');
  const validateBtn = document.getElementById('validateBtn');
  const skipBtn = document.getElementById('skipBtn');
  const feedbackDiv = document.getElementById('feedback');
  const progressFill = document.getElementById('progressFill');
  const sessionCounterSpan = document.getElementById('sessionCounter');

  function updateProgressDisplay() {
    const total = finalExercises.length;
    const answered = sessionAnswers.length;
    const percent = (answered / total) * 100;
    progressFill.style.width = percent + "%";
    sessionCounterSpan.innerText = `Question ${answered} / ${total}`;
  }

  function displayExercise() {
    const ex = finalExercises[currentIndex];
    if (!ex) return;
    compBadge.innerText = (ex.matiere === "francais" ? "🇫🇷 " : "🧮 ") + ex.competence;
    questionText.innerText = ex.text;
    let html = '';
    ex.choices.forEach((choice, idx) => {
      const letter = String.fromCharCode(65+idx);
      html += `
        <label class="choice">
          <input type="radio" name="choice" value="${escapeHtml(choice)}">
          <span class="choice-label">${letter}. ${escapeHtml(choice)}</span>
        </label>
      `;
    });
    choicesContainer.innerHTML = html;
    feedbackDiv.className = 'feedback';
    feedbackDiv.style.display = 'none';
    const radios = document.querySelectorAll('input[name="choice"]');
    radios.forEach(r => r.checked = false);
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function sendToSheet(prenom, matiere, competence, exerciceId, reponse, correct, tempsMs = 0) {
    if (!prenom) return;
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          prenom: prenom,
          matiere: matiere,
          competence: competence,
          exerciceId: exerciceId,
          reponse: reponse,
          correct: correct ? "true" : "false",
          scoreMax: "1",
          tempsMs: tempsMs.toString()
        })
      });
    } catch(e) { console.warn("Erreur envoi sheet", e); }
  }

  function loadProgress() {
    const savedIndex = localStorage.getItem('diagnostic_currentIndex');
    if (savedIndex !== null && !isNaN(parseInt(savedIndex))) {
      currentIndex = parseInt(savedIndex);
      if (currentIndex >= finalExercises.length) currentIndex = finalExercises.length - 1;
      if (currentIndex < 0) currentIndex = 0;
    } else currentIndex = 0;
    const savedAnswers = localStorage.getItem('diagnostic_sessionAnswers');
    if (savedAnswers) {
      try { sessionAnswers = JSON.parse(savedAnswers); } catch(e) { sessionAnswers = []; }
    } else sessionAnswers = [];
    updateProgressDisplay();
  }

  function saveProgress() {
    localStorage.setItem('diagnostic_currentIndex', currentIndex);
    localStorage.setItem('diagnostic_sessionAnswers', JSON.stringify(sessionAnswers));
  }

  async function checkAnswer() {
    const selectedRadio = document.querySelector('input[name="choice"]:checked');
    if (!selectedRadio) {
      feedbackDiv.innerText = "⚠️ Choisis une réponse avant de valider.";
      feedbackDiv.className = 'feedback incorrect';
      feedbackDiv.style.display = 'block';
      return;
    }
    const userAnswer = selectedRadio.value;
    const ex = finalExercises[currentIndex];
    const isCorrect = (userAnswer === ex.correct);
    sessionAnswers.push({ id: ex.id, correct: isCorrect, answer: userAnswer, matiere: ex.matiere });
    saveProgress();
    updateProgressDisplay();

    feedbackDiv.innerText = isCorrect ? "✔️ Bonne réponse !" : `❌ Mauvaise réponse. La bonne réponse était : ${ex.correct}`;
    feedbackDiv.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
    feedbackDiv.style.display = 'block';

    await sendToSheet(prenom, ex.matiere, ex.competence, ex.id, userAnswer, isCorrect, 0);

    setTimeout(() => {
      if (currentIndex + 1 < finalExercises.length) {
        currentIndex++;
        displayExercise();
        document.getElementById('diagnosticCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        feedbackDiv.innerText = "🎉 Diagnostic terminé ! Tes résultats ont été envoyés à l’enseignant. Retourne à l’accueil pour continuer ton entraînement.";
        feedbackDiv.className = 'feedback correct';
        feedbackDiv.style.display = 'block';
        validateBtn.disabled = true;
        skipBtn.disabled = true;
      }
      saveProgress();
    }, 1000);
  }

  function skipExercise() {
    if (currentIndex + 1 < finalExercises.length) {
      currentIndex++;
      displayExercise();
      feedbackDiv.style.display = 'none';
      saveProgress();
    } else {
      feedbackDiv.innerText = "Tu as déjà terminé le diagnostic !";
      feedbackDiv.className = 'feedback correct';
      feedbackDiv.style.display = 'block';
    }
  }

  // --- Gestion du prénom avec réinitialisation pour Testeur ---
  function initPrenom() {
    const saved = localStorage.getItem('elevePrenom');
    if (saved && prenomSelect.querySelector(`option[value="${saved}"]`)) {
      prenomSelect.value = saved;
      prenom = saved;
    } else {
      prenom = "";
    }

    // Si Testeur est déjà sélectionné au chargement, on efface la progression
    if (prenom === "Testeur") {
      localStorage.removeItem('diagnostic_currentIndex');
      localStorage.removeItem('diagnostic_sessionAnswers');
      currentIndex = 0;
      sessionAnswers = [];
      updateProgressDisplay();
      displayExercise();
    }

    prenomSelect.addEventListener('change', () => {
      const newPrenom = prenomSelect.value;
      if (newPrenom === "Testeur") {
        // Réinitialisation complète pour Testeur
        localStorage.removeItem('diagnostic_currentIndex');
        localStorage.removeItem('diagnostic_sessionAnswers');
        currentIndex = 0;
        sessionAnswers = [];
        updateProgressDisplay();
        displayExercise();
      }
      prenom = newPrenom;
      if (prenom) localStorage.setItem('elevePrenom', prenom);
      else localStorage.removeItem('elevePrenom');
    });
  }

  function init() {
    initPrenom();
    loadProgress();   // charge la progression normale (sauf si Testeur a tout effacé)
    displayExercise();
    validateBtn.addEventListener('click', checkAnswer);
    skipBtn.addEventListener('click', skipExercise);
  }

  init();
</script>
</body>
</html>
