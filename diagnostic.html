<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Diagnostic — Travailler évaluations nationales</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* (même style que précédemment, inchangé) */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090f;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }
    .header {
      background: #111118;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 1rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
    }
    .logo span { color: #e8c87a; }
    .student-area {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #09090f;
      padding: 0.4rem 1rem;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .student-area label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: #5ecfb1;
    }
    select {
      background: #1e1e2a;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 0.4rem 1rem;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1.5rem;
    }
    .progress-bar {
      background: #1e1e2a;
      border-radius: 60px;
      height: 8px;
      width: 100%;
      margin-bottom: 1.5rem;
    }
    .progress-fill {
      background: #f5a65a;
      width: 0%;
      height: 8px;
      border-radius: 60px;
      transition: width 0.2s;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: rgba(240,237,232,0.5);
      margin-bottom: 1.5rem;
    }
    .card {
      background: #111118;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .competence-badge {
      display: inline-block;
      background: rgba(245,166,90,0.15);
      border: 1px solid rgba(245,166,90,0.3);
      border-radius: 60px;
      padding: 0.2rem 0.8rem;
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      color: #f5a65a;
      margin-bottom: 1rem;
    }
    .question {
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }
    .choices {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
    }
    .choice {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: #1a1a24;
      padding: 0.7rem 1rem;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: background 0.1s;
    }
    .choice:hover {
      background: #262632;
    }
    input[type="radio"] {
      accent-color: #f5a65a;
      width: 18px;
      height: 18px;
    }
    .choice-label {
      font-size: 1rem;
    }
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: space-between;
      align-items: center;
    }
    button {
      background: rgba(245,166,90,0.1);
      border: 1px solid rgba(245,166,90,0.4);
      color: #f5a65a;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover {
      background: rgba(245,166,90,0.25);
    }
    .feedback {
      margin-top: 1rem;
      padding: 0.8rem;
      border-radius: 16px;
      font-size: 0.9rem;
      display: none;
    }
    .feedback.correct {
      background: rgba(126,207,138,0.15);
      border: 1px solid #7ecf8a;
      color: #7ecf8a;
      display: block;
    }
    .feedback.incorrect {
      background: rgba(245,90,90,0.15);
      border: 1px solid #f55a5a;
      color: #f55a5a;
      display: block;
    }
    .btn-secondary {
      background: transparent;
      border-color: rgba(255,255,255,0.2);
      color: rgba(240,237,232,0.7);
    }
    .footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.7rem;
      color: rgba(240,237,232,0.3);
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 2rem;
    }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .card { padding: 1.2rem; }
      .question { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">Travailler <span>évaluations nationales</span></div>
  <div class="student-area">
    <label>👤 Élève</label>
    <select id="prenomSelect">
      <option value="">-- Sélectionne --</option>
      <option value="Raphael">Raphael</option><option value="Heidi">Heidi</option><option value="Alice">Alice</option>
      <option value="Norah">Norah</option><option value="Adèle">Adèle</option><option value="Kim">Kim</option>
      <option value="Sheurley">Sheurley</option><option value="Iris">Iris</option><option value="Luc">Luc</option>
      <option value="Trecy">Trecy</option><option value="Loris">Loris</option><option value="Léna">Léna</option>
      <option value="Amandine">Amandine</option><option value="Ethan">Ethan</option><option value="Andryana">Andryana</option>
      <option value="Kaysia">Kaysia</option><option value="Camila">Camila</option><option value="Cassie">Cassie</option>
      <option value="Adriel">Adriel</option><option value="Testeur">Testeur</option>
    </select>
  </div>
</div>

<div class="container">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="stats">
    <span>📋 Diagnostic initial (30 questions)</span>
    <span id="sessionCounter">Question 0 / 30</span>
  </div>

  <div class="card" id="diagnosticCard">
    <div><span class="competence-badge" id="compBadge">Français</span></div>
    <div class="question" id="questionText"></div>
    <div class="choices" id="choicesContainer"></div>
    <div class="actions">
      <button id="validateBtn" class="btn-primary">✓ Vérifier</button>
      <button id="skipBtn" class="btn-secondary">⏩ Passer (sans enregistrer)</button>
    </div>
    <div id="feedback" class="feedback"></div>
  </div>
</div>
<div class="footer">
  <p>Diagnostic initial — Les résultats sont envoyés au tableau de bord enseignant.</p>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXtYaj1izgW7vHXlINk7vl1eVj_vTnV9Gq4TRShSJDlwKbnHwScwUzOW5PwDn_mLfk/exec";

  // --------------------------------------------------------------
  // BANQUE D'EXERCICES FRANÇAIS (conjugaison, grammaire, lexique, orthographe)
  const frenchExercises = [
    // Conjugaison (imparfait)
    { id: "CONJ1", competence: "Conjugaison", matiere: "francais", text: "Conjuguez le verbe « aller » à l’imparfait pour « nous ».", choices: ["nous allons", "nous allions", "nous irons", "nous allâmes"], correct: "nous allions" },
    // Grammaire - nature des mots
    { id: "GRAM1", competence: "Grammaire", matiere: "francais", text: "Quelle est la nature du mot « rapidement » ?", choices: ["adjectif", "nom", "verbe", "adverbe"], correct: "adverbe" },
    // Fonction - COD
    { id: "FONC1", competence: "Grammaire", matiere: "francais", text: "Dans « Marie mange une pomme », fonction de « une pomme » ?", choices: ["sujet", "COD", "COI", "complément circonstanciel"], correct: "COD" },
    // Orthographe – accord sujet-verbe
    { id: "ORTH1", competence: "Orthographe", matiere: "francais", text: "Complète : « Les poules ... dans la cour. » (picorer)", choices: ["picore", "picorent", "picorait", "picoreront"], correct: "picorent" },
    { id: "ORTH2", competence: "Orthographe", matiere: "francais", text: "Complète : « Les fleurs ... fanées. » (adjectif)", choices: ["fané", "fanée", "fanés", "fanées"], correct: "fanées" },
    // 13 compétences lexique (F1 à F8, F11 à F15, on supprime F9 et F10)
    { id: "F1_2", competence: "F1", matiere: "francais", text: "La nouvelle lui a fait de la peine.", choices: ["difficulté", "joie", "chagrin", "justesse"], correct: "chagrin" },
    { id: "F2_1", competence: "F2", matiere: "francais", text: "Lequel n’est pas une émotion ?", choices: ["panique", "chaise", "joie", "tristesse"], correct: "chaise" },
    { id: "F3_1", competence: "F3", matiere: "francais", text: "Mot de la même famille que manuel, manucure ?", choices: ["main", "manoir", "manteau", "manger"], correct: "main" },
    { id: "F4_1", competence: "F4", matiere: "francais", text: "Remplace « parle de » : Le documentaire ... la pollution.", choices: ["oublie", "évoque", "cache", "ignore"], correct: "évoque" },
    { id: "F5_1", competence: "F5", matiere: "francais", text: "Le suspect a été … en justice.", choices: ["convoqué", "jugé", "estimé", "puni"], correct: "jugé" },
    { id: "F6_1", competence: "F6", matiere: "francais", text: "Construit comme « chanteur » ?", choices: ["longueur", "danseur", "chaleur", "hauteur"], correct: "danseur" },
    { id: "F7_1", competence: "F7", matiere: "francais", text: "Intrus (pas le sens de mal-) ?", choices: ["malpropre", "maladroit", "malin", "malchanceux"], correct: "malin" },
    { id: "F8_1", competence: "F8", matiere: "francais", text: "Une maladie chronique dure...", choices: ["peu", "jamais", "longtemps", "parfois"], correct: "longtemps" },
    { id: "F11_1", competence: "F11", matiere: "francais", text: "« Lavable » signifie :", choices: ["qui lave", "lavé", "qui se lave", "que l’on peut laver"], correct: "que l’on peut laver" },
    { id: "F12_1", competence: "F12", matiere: "francais", text: "« Donner » = offrir ?", choices: ["Cette porte donne sur le jardin.", "Il donne son stylo.", "On donne une pièce.", "Le soleil donne de la lumière."], correct: "Il donne son stylo." },
    { id: "F13_1", competence: "F13", matiere: "francais", text: "« Avoir un chat dans la gorge » signifie :", choices: ["Avoir du mal à parler", "Avaler un chat", "Tousser", "Avoir soif"], correct: "Avoir du mal à parler" },
    { id: "F14_1", competence: "F14", matiere: "francais", text: "tremblement, angoisse, frayeur → thème :", choices: ["joie", "colère", "tristesse", "peur"], correct: "peur" },
    { id: "F15_1", competence: "F15", matiere: "francais", text: "Synonyme de succulent ?", choices: ["fade", "amer", "brûlant", "délicieux"], correct: "délicieux" }
  ];

  // BANQUE EXERCICES MATHÉMATIQUES (problèmes simples + problèmes complexes)
  const mathExercises = [
    // Problème simple à une opération
    { id: "M1_1", competence: "M1", matiere: "maths", text: "36 objets pèsent 1,8 kg. Masse d’un objet ?", choices: ["0,5 kg", "50 g", "5 g", "0,05 kg"], correct: "50 g" },
    { id: "M3_1", competence: "M3", matiere: "maths", text: "Périmètre = 240 cm, largeur = 30 cm. Longueur ?", choices: ["60 cm", "90 cm", "120 cm", "180 cm"], correct: "90 cm" },
    { id: "M4_1", competence: "M4", matiere: "maths", text: "5 paquets coûtent 7,50 €. Prix de 3 paquets ?", choices: ["3 €", "4 €", "4,50 €", "5 €"], correct: "4,50 €" },
    { id: "M5_1", competence: "M5", matiere: "maths", text: "Rectangle 6 carreaux sur 4 (1 cm/carreau). Périmètre ?", choices: ["20 cm", "24 cm", "18 cm", "22 cm"], correct: "20 cm" },
    { id: "M6_1", competence: "M6", matiere: "maths", text: "6,3 × 4 = ?", choices: ["24,2", "25,2", "25,6", "26,2"], correct: "25,2" },
    { id: "M7_1", competence: "M7", matiere: "maths", text: "3 stylos à 1,80 €, donne 10 €. Rendue ?", choices: ["4,60 €", "4,20 €", "5,40 €", "6,20 €"], correct: "4,60 €" },
    { id: "M8_1", competence: "M8", matiere: "maths", text: "3 t‑shirts et 5 casquettes : nombre de tenues ?", choices: ["8", "15", "12", "20"], correct: "15" },
    { id: "M9_1", competence: "M9", matiere: "maths", text: "Début 9h45, durée 35 min → fin ?", choices: ["10h10", "10h20", "10h30", "10h00"], correct: "10h20" },
    { id: "M10_1", competence: "M10", matiere: "maths", text: "5 pers., 6 j, 25 €/j → total ?", choices: ["500 €", "750 €", "600 €", "900 €"], correct: "750 €" },
    { id: "M11_1", competence: "M11", matiere: "maths", text: "56 bonbons, donne 9 par enfant, reste 2. Enfants ?", choices: ["5", "6", "7", "8"], correct: "6" },
    { id: "M13_1", competence: "M13", matiere: "maths", text: "Douche 50 L, bain 180 L. Économie sur 5 j ?", choices: ["650 L", "700 L", "750 L", "900 L"], correct: "650 L" },
    { id: "M14_1", competence: "M14", matiere: "maths", text: "Moitié de 12,6 ?", choices: ["6,2", "6,3", "6,4", "6,1"], correct: "6,3" },
    { id: "M15_1", competence: "M15", matiere: "maths", text: "Nombre + 7 = moitié de 200. Nombre ?", choices: ["93", "97", "103", "107"], correct: "93" },
    // Problèmes complexes (2 opérations)
    { id: "CMP1", competence: "Problèmes complexes", matiere: "maths", text: "Un lot de 3 cahiers coûte 12 €. J’achète 6 cahiers et je paie avec un billet de 50 €. Combien me rend‑on ?", choices: ["26 €", "24 €", "14 €", "38 €"], correct: "26 €" },
    { id: "CMP2", competence: "Problèmes complexes", matiere: "maths", text: "Dans une classe de 25 élèves, chaque élève donne 2 € pour un projet. La maîtresse ajoute 15 €. Combien d’argent ont‑ils au total ?", choices: ["50 €", "65 €", "40 €", "55 €"], correct: "65 €" }
  ];

  // Mélanger et sélectionner 15 français + 15 maths
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const shuffledFrench = shuffleArray([...frenchExercises]);
  const shuffledMath = shuffleArray([...mathExercises]);
  const diagnosticExercises = [
    ...shuffledFrench.slice(0, 15),
    ...shuffledMath.slice(0, 15)
  ];
  const finalExercises = shuffleArray(diagnosticExercises);

  // État et fonctions (inchangés)
  let currentIndex = 0;
  let sessionAnswers = [];
  let prenom = "";

  const prenomSelect = document.getElementById('prenomSelect');
  const compBadge = document.getElementById('compBadge');
  const questionText = document.getElementById('questionText');
  const choicesContainer = document.getElementById('choicesContainer');
  const validateBtn = document.getElementById('validateBtn');
  const skipBtn = document.getElementById('skipBtn');
  const feedbackDiv = document.getElementById('feedback');
  const progressFill = document.getElementById('progressFill');
  const sessionCounterSpan = document.getElementById('sessionCounter');

  function loadProgress() {
    const savedIndex = localStorage.getItem('diagnostic_currentIndex');
    if (savedIndex !== null && !isNaN(parseInt(savedIndex))) {
      currentIndex = parseInt(savedIndex);
      if (currentIndex >= finalExercises.length) currentIndex = finalExercises.length - 1;
      if (currentIndex < 0) currentIndex = 0;
    } else currentIndex = 0;
    const savedAnswers = localStorage.getItem('diagnostic_sessionAnswers');
    if (savedAnswers) {
      try { sessionAnswers = JSON.parse(savedAnswers); } catch(e) { sessionAnswers = []; }
    } else sessionAnswers = [];
    updateProgressDisplay();
  }

  function saveProgress() {
    localStorage.setItem('diagnostic_currentIndex', currentIndex);
    localStorage.setItem('diagnostic_sessionAnswers', JSON.stringify(sessionAnswers));
  }

  function updateProgressDisplay() {
    const total = finalExercises.length;
    const answered = sessionAnswers.length;
    const percent = (answered / total) * 100;
    progressFill.style.width = percent + "%";
    sessionCounterSpan.innerText = `Question ${answered} / ${total}`;
  }

  function displayExercise() {
    const ex = finalExercises[currentIndex];
    if (!ex) return;
    compBadge.innerText = (ex.matiere === "francais" ? "🇫🇷 " : "🧮 ") + ex.competence;
    questionText.innerText = ex.text;
    let html = '';
    ex.choices.forEach((choice, idx) => {
      const letter = String.fromCharCode(65+idx);
      html += `
        <label class="choice">
          <input type="radio" name="choice" value="${escapeHtml(choice)}">
          <span class="choice-label">${letter}. ${escapeHtml(choice)}</span>
        </label>
      `;
    });
    choicesContainer.innerHTML = html;
    feedbackDiv.className = 'feedback';
    feedbackDiv.style.display = 'none';
    const radios = document.querySelectorAll('input[name="choice"]');
    radios.forEach(r => r.checked = false);
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function sendToSheet(prenom, matiere, competence, exerciceId, reponse, correct, tempsMs = 0) {
    if (!prenom) return;
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          prenom: prenom,
          matiere: matiere,
          competence: competence,
          exerciceId: exerciceId,
          reponse: reponse,
          correct: correct ? "true" : "false",
          scoreMax: "1",
          tempsMs: tempsMs.toString()
        })
      });
    } catch(e) { console.warn("Erreur envoi sheet", e); }
  }

  async function checkAnswer() {
    const selectedRadio = document.querySelector('input[name="choice"]:checked');
    if (!selectedRadio) {
      feedbackDiv.innerText = "⚠️ Choisis une réponse avant de valider.";
      feedbackDiv.className = 'feedback incorrect';
      feedbackDiv.style.display = 'block';
      return;
    }
    const userAnswer = selectedRadio.value;
    const ex = finalExercises[currentIndex];
    const isCorrect = (userAnswer === ex.correct);
    sessionAnswers.push({ id: ex.id, correct: isCorrect, answer: userAnswer, matiere: ex.matiere });
    saveProgress();
    updateProgressDisplay();

    feedbackDiv.innerText = isCorrect ? "✔️ Bonne réponse !" : `❌ Mauvaise réponse. La bonne réponse était : ${ex.correct}`;
    feedbackDiv.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
    feedbackDiv.style.display = 'block';

    await sendToSheet(prenom, ex.matiere, ex.competence, ex.id, userAnswer, isCorrect, 0);

    setTimeout(() => {
      if (currentIndex + 1 < finalExercises.length) {
        currentIndex++;
        displayExercise();
        document.getElementById('diagnosticCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        feedbackDiv.innerText = "🎉 Diagnostic terminé ! Tes résultats ont été envoyés à l’enseignant.";
        feedbackDiv.className = 'feedback correct';
        feedbackDiv.style.display = 'block';
        validateBtn.disabled = true;
        skipBtn.disabled = true;
      }
      saveProgress();
    }, 1000);
  }

  function skipExercise() {
    if (currentIndex + 1 < finalExercises.length) {
      currentIndex++;
      displayExercise();
      feedbackDiv.style.display = 'none';
      saveProgress();
    } else {
      feedbackDiv.innerText = "Tu as déjà terminé le diagnostic !";
      feedbackDiv.className = 'feedback correct';
      feedbackDiv.style.display = 'block';
    }
  }

  function initPrenom() {
    const saved = localStorage.getItem('elevePrenom');
    if (saved && prenomSelect.querySelector(`option[value="${saved}"]`)) {
      prenomSelect.value = saved;
      prenom = saved;
    } else prenom = "";
    prenomSelect.addEventListener('change', () => {
      prenom = prenomSelect.value;
      if (prenom) localStorage.setItem('elevePrenom', prenom);
      else localStorage.removeItem('elevePrenom');
    });
  }

  function init() {
    initPrenom();
    loadProgress();
    displayExercise();
    validateBtn.addEventListener('click', checkAnswer);
    skipBtn.addEventListener('click', skipExercise);
  }

  init();
</script>
</body>
</html>
