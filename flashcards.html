<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Flashcards — Travailler évaluations nationales</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090f;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      line-height: 1.5;
      min-height: 100vh;
    }
    .header {
      background: #111118;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 1rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
    }
    .logo span { color: #e8c87a; }
    .student-area {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #09090f;
      padding: 0.4rem 1rem;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .student-area label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: #5ecfb1;
    }
    select {
      background: #1e1e2a;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 0.4rem 1rem;
      color: #f0ede8;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1.5rem;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: rgba(240,237,232,0.5);
      margin-bottom: 1rem;
    }
    .flashcard {
      perspective: 1500px;
      margin-bottom: 2rem;
    }
    .card-inner {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      cursor: pointer;
    }
    .card-inner.flipped {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 28px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #111118;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .card-front {
      background: linear-gradient(145deg, #111118, #0c0c14);
    }
    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(145deg, #1a1a28, #111118);
      border-left: 4px solid #5ecfb1;
    }
    .badge {
      display: inline-block;
      background: rgba(94,207,177,0.15);
      border: 1px solid rgba(94,207,177,0.3);
      border-radius: 60px;
      padding: 0.2rem 0.8rem;
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      color: #5ecfb1;
      margin-bottom: 1rem;
      align-self: flex-start;
    }
    .question {
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 1rem;
    }
    .answer {
      font-size: 1.2rem;
      line-height: 1.5;
      color: #e8c87a;
    }
    .hint {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: rgba(240,237,232,0.4);
    }
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
    }
    button {
      background: rgba(94,207,177,0.1);
      border: 1px solid rgba(94,207,177,0.4);
      color: #5ecfb1;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.15s;
    }
    button:hover {
      background: rgba(94,207,177,0.25);
    }
    .progress {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: rgba(240,237,232,0.5);
    }
    .footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.7rem;
      color: rgba(240,237,232,0.3);
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 2rem;
    }
    @media (max-width: 600px) {
      .container { padding: 1rem; }
      .question { font-size: 1.2rem; }
      .answer { font-size: 1rem; }
      .card-front, .card-back { padding: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">Travailler <span>évaluations nationales</span></div>
  <div class="student-area">
    <label>👤 Élève</label>
    <select id="prenomSelect">
      <option value="">-- Sélectionne --</option>
      <option value="Raphael">Raphael</option><option value="Heidi">Heidi</option><option value="Alice">Alice</option>
      <option value="Norah">Norah</option><option value="Adèle">Adèle</option><option value="Kim">Kim</option>
      <option value="Sheurley">Sheurley</option><option value="Iris">Iris</option><option value="Luc">Luc</option>
      <option value="Trecy">Trecy</option><option value="Loris">Loris</option><option value="Léna">Léna</option>
      <option value="Amandine">Amandine</option><option value="Ethan">Ethan</option><option value="Andryana">Andryana</option>
      <option value="Kaysia">Kaysia</option><option value="Camila">Camila</option><option value="Cassie">Cassie</option>
      <option value="Adriel">Adriel</option><option value="Testeur">Testeur</option>
    </select>
  </div>
</div>

<div class="container">
  <div class="stats">
    <span>📇 Flashcards — Révision des compétences clés</span>
    <span id="cardCounter">Carte 1 / 34</span>
  </div>
  <div class="flashcard" id="flashcard">
    <div class="card-inner" id="cardInner">
      <div class="card-front">
        <div class="badge" id="frontBadge">Français Conjugaison</div>
        <div class="question" id="frontQuestion"></div>
        <div class="hint">👆 Clique sur la carte pour la retourner</div>
      </div>
      <div class="card-back">
        <div class="badge" id="backBadge">Réponse</div>
        <div class="answer" id="backAnswer"></div>
        <div class="hint">👆 Clique pour revenir</div>
      </div>
    </div>
  </div>
  <div class="actions">
    <button id="prevBtn">◀ Précédent</button>
    <button id="randomBtn">🎲 Aléatoire</button>
    <button id="nextBtn">Suivant ▶</button>
  </div>
  <div class="progress" id="progressMessage"></div>
</div>
<div class="footer">
  <p>Révise à ton rythme. Flashcards couvrant français (conjugaison, grammaire, lexique, orthographe) et maths.</p>
</div>

<script>
  // --------------------------------------------------------------
  // DONNÉES DES FLASHCARDS (34 cartes – enrichies avec les priorités)
  const flashcards = [
    // Conjugaison
    { id: "CONJ1", matiere: "francais", title: "Conjugaison – imparfait", question: "Comment conjugue-t-on le verbe « aller » à l’imparfait pour « nous » ?", answer: "nous allions" },
    { id: "CONJ2", matiere: "francais", title: "Conjugaison – passé composé", question: "Comment conjugue-t-on le verbe « prendre » au passé composé pour « ils » ?", answer: "ils ont pris" },
    { id: "CONJ3", matiere: "francais", title: "Conjugaison – présent (3e groupe)", question: "Conjugue « finir » au présent pour « tu ».", answer: "tu finis" },
    // Grammaire
    { id: "GRAM1", matiere: "francais", title: "Nature des mots", question: "Quelle est la nature du mot « rapidement » ?", answer: "adverbe" },
    { id: "GRAM2", matiere: "francais", title: "Fonction COD", question: "Dans « Marie mange une pomme », fonction de « une pomme » ?", answer: "COD" },
    { id: "GRAM3", matiere: "francais", title: "Fonction COI", question: "Dans « Il parle à son ami », fonction de « à son ami » ?", answer: "COI" },
    // Orthographe
    { id: "ORTH1", matiere: "francais", title: "Orthographe – accord sujet-verbe", question: "Complète : « Les odeurs qui viennent de la cuisine … délicieuses. » (être)", answer: "sont" },
    { id: "ORTH2", matiere: "francais", title: "Orthographe – accord GN", question: "Complète : « Des tables … et propres. » (blanc)", answer: "blanches" },
    // Lexique (items prioritaires)
    { id: "LEX1", matiere: "francais", title: "Sens de « peine »", question: "Dans « Il éprouve de la peine à parler », que signifie « peine » ?", answer: "difficulté" },
    { id: "LEX2", matiere: "francais", title: "Champ lexical émotion", question: "Quel mot n’est pas une émotion : inquiétude, angoisse, rumeur, frissonnante ?", answer: "rumeur" },
    { id: "LEX3", matiere: "francais", title: "Famille du mot « main »", question: "Lequel est de la même famille que manuel, manucure, manuscrit ?", answer: "main" },
    { id: "LEX4", matiere: "francais", title: "Verbes précis", question: "Remplace « parle de » dans « Le texte parle de l’enfance de l’auteur ».", answer: "évoque" },
    { id: "LEX5", matiere: "francais", title: "Même mot (polysémie)", question: "Complète : « Marie n’a pas … nécessaire de nous prévenir. » / « Le délinquant va être … en comparution immédiate. » (même mot)", answer: "jugé" },
    { id: "LEX6", matiere: "francais", title: "Suffixe -eur", question: "Lequel est formé comme « vendeur » (verbe + -eur) ? malheur, chaleur, joueur, longueur", answer: "joueur" },
    { id: "LEX7", matiere: "francais", title: "Préfixe mal-", question: "Trouve l’intrus (pas le sens négatif) : malade, malhabile, malheureux, malchanceux", answer: "malade" },
    // Autres compétences françaises (gardées)
    { id: "F8", matiere: "francais", title: "Adjectif « chronique »", question: "Une maladie chronique dure-t-elle longtemps ou peu de temps ?", answer: "Longtemps" },
    { id: "F12", matiere: "francais", title: "Sens de « donner »", question: "Dans quelle phrase « donner » signifie « offrir » ? « Il donne son stylo » ou « Cette porte donne sur le jardin » ?", answer: "Il donne son stylo" },
    { id: "F13", matiere: "francais", title: "Expression", question: "« Avoir un chat dans la gorge » signifie :", answer: "Avoir du mal à parler" },
    // Maths (15 compétences)
    { id: "M1", matiere: "maths", title: "Masse unitaire", question: "36 objets identiques pèsent 1,8 kg. Masse d’un objet ?", answer: "50 g" },
    { id: "M2", matiere: "maths", title: "Proportionnalité", question: "5 paquets coûtent 7,50 €. Prix de 3 paquets ?", answer: "4,50 €" },
    { id: "M3", matiere: "maths", title: "Périmètre rectangle", question: "Périmètre = 240 cm, largeur = 30 cm. Longueur ?", answer: "90 cm" },
    { id: "M4", matiere: "maths", title: "Périmètre quadrillage", question: "Rectangle 6 carreaux sur 4 (1 cm/carreau). Périmètre ?", answer: "20 cm" },
    { id: "M5", matiere: "maths", title: "Multiplication décimale", question: "6,3 × 4 = ?", answer: "25,2" },
    { id: "M6", matiere: "maths", title: "Monnaie rendue", question: "3 stylos à 1,80 €, donne 10 €. Rendue ?", answer: "4,60 €" },
    { id: "M7", matiere: "maths", title: "Combinaisons", question: "3 t‑shirts et 5 casquettes : nombre de tenues ?", answer: "15" },
    { id: "M8", matiere: "maths", title: "Calcul durée", question: "Début 9h45, durée 35 min → fin ?", answer: "10h20" },
    { id: "M9", matiere: "maths", title: "Coût total", question: "5 personnes, 6 jours, 25 €/jour → total ?", answer: "750 €" },
    { id: "M10", matiere: "maths", title: "Partage avec reste", question: "56 bonbons, donne 9 par enfant, reste 2. Enfants ?", answer: "6" },
    { id: "M11", matiere: "maths", title: "Opération litres", question: "9 bouteilles de 0,75 L : opération ?", answer: "9 × 0,75" },
    { id: "M12", matiere: "maths", title: "Économie d’eau", question: "Douche 50 L, bain 180 L. Économie sur 5 jours ?", answer: "650 L" },
    { id: "M13", matiere: "maths", title: "Moitié d’un décimal", question: "Moitié de 12,6 ?", answer: "6,3" },
    { id: "M14", matiere: "maths", title: "Équation simple", question: "Nombre + 7 = moitié de 200. Nombre ?", answer: "93" },
    { id: "M15", matiere: "maths", title: "Problème complexe", question: "Lot de 3 cahiers = 12 €. J’achète 6 cahiers, paie 50 €. Rendue ?", answer: "26 €" }
  ];

  let currentIndex = 0;
  let isFlipped = false;
  let prenom = "";

  const prenomSelect = document.getElementById('prenomSelect');
  const cardInner = document.getElementById('cardInner');
  const frontBadge = document.getElementById('frontBadge');
  const frontQuestion = document.getElementById('frontQuestion');
  const backBadge = document.getElementById('backBadge');
  const backAnswer = document.getElementById('backAnswer');
  const cardCounterSpan = document.getElementById('cardCounter');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const randomBtn = document.getElementById('randomBtn');
  const progressMsg = document.getElementById('progressMessage');

  function updateCard() {
    const card = flashcards[currentIndex];
    if (!card) return;
    const badgeText = `${card.matiere === 'francais' ? '🇫🇷' : '🧮'} ${card.title}`;
    frontBadge.textContent = badgeText;
    frontQuestion.textContent = card.question;
    backBadge.textContent = `${card.matiere === 'francais' ? 'Français' : 'Maths'} - Réponse`;
    backAnswer.textContent = card.answer;
    cardCounterSpan.textContent = `Carte ${currentIndex+1} / ${flashcards.length}`;
    if (isFlipped) {
      cardInner.classList.remove('flipped');
      isFlipped = false;
    }
    progressMsg.textContent = `📌 ${card.matiere === 'francais' ? 'Français' : 'Maths'} — ${card.title}`;
  }

  function flipCard() {
    cardInner.classList.toggle('flipped');
    isFlipped = !isFlipped;
  }

  function nextCard() {
    if (currentIndex + 1 < flashcards.length) {
      currentIndex++;
      updateCard();
    } else {
      progressMsg.textContent = "🎉 Bravo ! Tu as révisé toutes les flashcards.";
    }
  }

  function prevCard() {
    if (currentIndex - 1 >= 0) {
      currentIndex--;
      updateCard();
    } else {
      progressMsg.textContent = "C’est la première carte.";
      setTimeout(() => { progressMsg.textContent = ""; }, 1500);
    }
  }

  function randomCard() {
    const newIndex = Math.floor(Math.random() * flashcards.length);
    currentIndex = newIndex;
    updateCard();
  }

  // Gestion prénom avec réinitialisation pour Testeur (retour à la première carte)
  function initPrenom() {
    const saved = localStorage.getItem('elevePrenom');
    if (saved && prenomSelect.querySelector(`option[value="${saved}"]`)) {
      prenomSelect.value = saved;
      prenom = saved;
    } else {
      prenom = "";
    }

    // Si Testeur est déjà sélectionné au chargement, on remet à zéro
    if (prenom === "Testeur") {
      currentIndex = 0;
      updateCard();
    }

    prenomSelect.addEventListener('change', () => {
      const newPrenom = prenomSelect.value;
      if (newPrenom === "Testeur") {
        currentIndex = 0;
        updateCard();
      }
      prenom = newPrenom;
      if (prenom) localStorage.setItem('elevePrenom', prenom);
      else localStorage.removeItem('elevePrenom');
    });
  }

  cardInner.addEventListener('click', flipCard);
  prevBtn.addEventListener('click', prevCard);
  nextBtn.addEventListener('click', nextCard);
  randomBtn.addEventListener('click', randomCard);

  initPrenom();
  updateCard();
</script>
</body>
</html>
